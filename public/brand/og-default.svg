<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Lankawa  Built for Sri Lankans, by Sri Lankans">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="50%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="lk-teal-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <radialGradient id="teal-glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#0d9488" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0d9488" stop-opacity="0"/>
    </radialGradient>
    <pattern id="geo-pattern" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M40 0 L80 40 L40 80 L0 40 Z" fill="none" stroke="#14b8a6" stroke-width="0.5" opacity="0.06"/>
      <circle cx="40" cy="40" r="2" fill="#14b8a6" opacity="0.04"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-grad)"/>
  <rect width="1200" height="630" fill="url(#geo-pattern)"/>
  <ellipse cx="600" cy="280" rx="400" ry="250" fill="url(#teal-glow)"/>

  <!-- Tricolor accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="#8b2635" opacity="0.6"/>
  <rect x="0" y="4" width="1200" height="2" fill="#0d9488" opacity="0.8"/>
  <rect x="0" y="6" width="1200" height="2" fill="#d4a24c" opacity="0.5"/>

  <!-- Logo mark (scaled) -->
  <g transform="translate(520, 180) scale(4)">
    <path
      d="M16 4c-4 2-7 6-8 10-1.5 5 0 10 3 14 2.5 3.5 5 4.5 5 4.5s2.5-1 5-4.5c3-4 4.5-9 3-14-1-4-4-8-8-10z"
      fill="url(#lk-teal-grad)"
    />
    <path
      d="M10 16c2-3 4-4 6-4s4 1 6 4"
      fill="none"
      stroke="#f8fafc"
      stroke-width="1.5"
      stroke-linecap="round"
      opacity="0.85"
    />
    <circle cx="9" cy="15" r="1.75" fill="#d4a24c"/>
  </g>

  <!-- Wordmark -->
  <text
    x="600"
    y="400"
    text-anchor="middle"
    font-family="ui-sans-serif, system-ui, 'Noto Sans', sans-serif"
    font-size="72"
    font-weight="700"
    fill="#f8fafc"
    letter-spacing="-0.02em"
  >Lank<tspan fill="#2dd4bf">awa</tspan></text>

  <!-- Tagline -->
  <text
    x="600"
    y="460"
    text-anchor="middle"
    font-family="ui-sans-serif, system-ui, 'Noto Sans', sans-serif"
    font-size="28"
    font-weight="400"
    fill="#94a3b8"
    letter-spacing="0.02em"
  >Built for Sri Lankans, by Sri Lankans</text>

  <!-- Subtitle -->
  <text
    x="600"
    y="510"
    text-anchor="middle"
    font-family="ui-sans-serif, system-ui, 'Noto Sans', sans-serif"
    font-size="20"
    font-weight="400"
    fill="#64748b"
  >Sri Lanka's all-in-one civic intelligence platform</text>
</svg>
