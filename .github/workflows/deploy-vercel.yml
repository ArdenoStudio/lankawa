name: Deploy Vercel

# Prefer Vercel Git integration (Project → Settings → Git → Connect
# ArdenoStudio/lankawa, production branch = main). This workflow is a
# backup when Git is not linked: it deploys on push to main when secrets exist.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vercel-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Check Vercel secrets
        id: secrets
        run: |
          if [ -n "$VERCEL_TOKEN" ] && [ -n "$VERCEL_ORG_ID" ] && [ -n "$VERCEL_PROJECT_ID" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Skipping deploy — set repository secrets VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID (or connect GitHub in the Vercel project)."
          fi

      - uses: actions/checkout@v4
        if: steps.secrets.outputs.ready == 'true'

      - uses: actions/setup-node@v4
        if: steps.secrets.outputs.ready == 'true'
        with:
          node-version: 22
          cache: npm

      - name: Install Vercel CLI
        if: steps.secrets.outputs.ready == 'true'
        run: npm install -g vercel@39.2.6

      - name: Pull production env
        if: steps.secrets.outputs.ready == 'true'
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build
        if: steps.secrets.outputs.ready == 'true'
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy production
        if: steps.secrets.outputs.ready == 'true'
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"

      - name: Verify production drift
        if: steps.secrets.outputs.ready == 'true'
        run: |
          npm ci
          node scripts/check-prod-drift.mjs
