title: Seylan Bank API
host: https://www.seylan.lk
tier: A
category: banks
probe_delay_seconds: 1.0
ethics: See docs/ETHICS.md
source_docs_in_lankawa:
- docs/BANK_API_DEEP_DIVE_SAMPATH_SEYLAN_NSB.md
endpoints:
- id: exchange_rates_usd
  method: GET
