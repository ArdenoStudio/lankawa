[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "sc-hsbc-offers-park-docs-unofficial"
version = "0.1.0"
description = "Minimal unofficial HTTP helpers for Standard Chartered + HSBC LK offers (park notes) (educational)"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = []

[project.urls]
Homepage = "https://github.com/Cookie-Cat21/sc-hsbc-offers-park-docs"

[tool.setuptools]
packages = ["sc_hsbc_offers_park_docs"]
