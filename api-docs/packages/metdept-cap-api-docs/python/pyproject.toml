[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "metdept-cap-api-docs-unofficial"
version = "0.1.0"
description = "Minimal unofficial HTTP helpers for Met Dept CAP / Advisories (educational)"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = []

[project.urls]
Homepage = "https://github.com/Cookie-Cat21/metdept-cap-api-docs"

[tool.setuptools]
packages = ["metdept_cap_api_docs"]
