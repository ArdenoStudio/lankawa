[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "ardeno-sister-backends-docs-unofficial"
version = "0.1.0"
description = "Minimal unofficial HTTP helpers for Ardeno Sister Backends (educational)"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = []

[project.urls]
Homepage = "https://github.com/Cookie-Cat21/ardeno-sister-backends-docs"

[tool.setuptools]
packages = ["ardeno_sister_backends_docs"]
