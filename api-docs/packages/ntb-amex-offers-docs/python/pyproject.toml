[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "ntb-amex-offers-docs-unofficial"
version = "0.1.0"
description = "Minimal unofficial HTTP helpers for NTB Mastercard + Amex Offers (educational)"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = []

[project.urls]
Homepage = "https://github.com/Cookie-Cat21/ntb-amex-offers-docs"

[tool.setuptools]
packages = ["ntb_amex_offers_docs"]
