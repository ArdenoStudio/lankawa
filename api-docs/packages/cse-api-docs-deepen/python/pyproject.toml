[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "cse-api-docs-deepen-unofficial"
version = "0.1.0"
description = "Minimal unofficial HTTP helpers for CSE (cse.lk) API — deepen pack (educational)"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = []

[project.urls]
Homepage = "https://github.com/Cookie-Cat21/cse-api-docs-deepen"

[tool.setuptools]
packages = ["cse_api_docs_deepen"]
