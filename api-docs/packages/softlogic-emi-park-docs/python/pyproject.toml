[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "softlogic-emi-park-docs-unofficial"
version = "0.1.0"
description = "Minimal unofficial HTTP helpers for Softlogic EMI (park — heavy crawl) (educational)"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = []

[project.urls]
Homepage = "https://github.com/Cookie-Cat21/softlogic-emi-park-docs"

[tool.setuptools]
packages = ["softlogic_emi_park_docs"]
