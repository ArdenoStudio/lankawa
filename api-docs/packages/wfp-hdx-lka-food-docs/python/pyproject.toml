[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "wfp-hdx-lka-food-docs-unofficial"
version = "0.1.0"
description = "Minimal unofficial HTTP helpers for WFP HDX Sri Lanka Food Prices (educational)"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = []

[project.urls]
Homepage = "https://github.com/Cookie-Cat21/wfp-hdx-lka-food-docs"

[tool.setuptools]
packages = ["wfp_hdx_lka_food_docs"]
