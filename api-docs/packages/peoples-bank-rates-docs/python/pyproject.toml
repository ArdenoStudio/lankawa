[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "peoples-bank-rates-docs-unofficial"
version = "0.1.0"
description = "Minimal unofficial HTTP helpers for People's Bank Rates (educational)"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = []

[project.urls]
Homepage = "https://github.com/Cookie-Cat21/peoples-bank-rates-docs"

[tool.setuptools]
packages = ["peoples_bank_rates_docs"]
