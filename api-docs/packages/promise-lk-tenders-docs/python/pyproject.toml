[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "promise-lk-tenders-docs-unofficial"
version = "0.1.0"
description = "Minimal unofficial HTTP helpers for Promise.lk tenders (educational)"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = []

[project.urls]
Homepage = "https://github.com/Cookie-Cat21/promise-lk-tenders-docs"

[tool.setuptools]
packages = ["promise_lk_tenders_docs"]
