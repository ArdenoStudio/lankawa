[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "pabc-card-offers-docs-unofficial"
version = "0.1.0"
description = "Minimal unofficial HTTP helpers for Pan Asia Bank Card Offers (educational)"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = []

[project.urls]
Homepage = "https://github.com/Cookie-Cat21/pabc-card-offers-docs"

[tool.setuptools]
packages = ["pabc_card_offers_docs"]
