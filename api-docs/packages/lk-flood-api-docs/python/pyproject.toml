[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "lk-flood-api-docs-unofficial"
version = "0.1.0"
description = "Minimal unofficial HTTP helpers for lk-flood-api (nuuuwan) (educational)"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = []

[project.urls]
Homepage = "https://github.com/Cookie-Cat21/lk-flood-api-docs"

[tool.setuptools]
packages = ["lk_flood_api_docs"]
