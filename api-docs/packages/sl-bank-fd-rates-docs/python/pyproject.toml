[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "sl-bank-fd-rates-docs-unofficial"
version = "0.1.0"
description = "Minimal unofficial HTTP helpers for SL Bank Fixed Deposit Rates (educational)"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = []

[project.urls]
Homepage = "https://github.com/Cookie-Cat21/sl-bank-fd-rates-docs"

[tool.setuptools]
packages = ["sl_bank_fd_rates_docs"]
