[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "singer-emi-api-docs-unofficial"
version = "0.1.0"
description = "Minimal unofficial HTTP helpers for Singer Sri Lanka EMI API (educational)"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = []

[project.urls]
Homepage = "https://github.com/Cookie-Cat21/singer-emi-api-docs"

[tool.setuptools]
packages = ["singer_emi_api_docs"]
