[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "open-meteo-lk-docs-unofficial"
version = "0.1.0"
description = "Minimal unofficial HTTP helpers for Open-Meteo Sri Lanka Recipes (educational)"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = []

[project.urls]
Homepage = "https://github.com/Cookie-Cat21/open-meteo-lk-docs"

[tool.setuptools]
packages = ["open_meteo_lk_docs"]
