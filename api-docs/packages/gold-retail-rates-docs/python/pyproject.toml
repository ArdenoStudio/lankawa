[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "gold-retail-rates-docs-unofficial"
version = "0.1.0"
description = "Minimal unofficial HTTP helpers for Gold retail rates research pack (educational)"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = []

[project.urls]
Homepage = "https://github.com/Cookie-Cat21/gold-retail-rates-docs"

[tool.setuptools]
packages = ["gold_retail_rates_docs"]
