[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "sl-bank-remittance-tt-docs-unofficial"
version = "0.1.0"
description = "Minimal unofficial HTTP helpers for SL Bank Remittance TT Rates (educational)"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = []

[project.urls]
Homepage = "https://github.com/Cookie-Cat21/sl-bank-remittance-tt-docs"

[tool.setuptools]
packages = ["sl_bank_remittance_tt_docs"]
