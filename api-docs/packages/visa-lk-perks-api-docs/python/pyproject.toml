[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "visa-lk-perks-api-docs-unofficial"
version = "0.1.0"
description = "Minimal unofficial HTTP helpers for Visa LK Perks API (educational)"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = []

[project.urls]
Homepage = "https://github.com/Cookie-Cat21/visa-lk-perks-api-docs"

[tool.setuptools]
packages = ["visa_lk_perks_api_docs"]
