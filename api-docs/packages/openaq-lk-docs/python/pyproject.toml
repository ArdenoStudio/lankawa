[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "openaq-lk-docs-unofficial"
version = "0.1.0"
description = "Minimal unofficial HTTP helpers for OpenAQ Sri Lanka (educational)"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = []

[project.urls]
Homepage = "https://github.com/Cookie-Cat21/openaq-lk-docs"

[tool.setuptools]
packages = ["openaq_lk_docs"]
